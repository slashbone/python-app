
image:
  repository: slashbone/backstage
  tag: "1.0"
  pullPolicy: Always

# Pull Secret para a imagem do Backstage
imagePullSecrets:
  - name: dockerhub-cred

replicaCount: 1

ingress:
  enabled: true
  className: nginx
  host: backstage.localtest.me
  tls:
    enabled: false
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"

service:
  type: ClusterIP
  port: 80

resources:
  requests:
    cpu: "250m"
    memory: "512Mi"
  limits:
    cpu: "1000m"
    memory: "1Gi"

# ------------------------------
# PostgreSQL (subchart Bitnami)
# ------------------------------
postgresql:
  enabled: true

  # Formato correto que o Bitnami espera
  image:
    registry: docker.io
    repository: bitnami/postgresql
    tag: "16"                  # evita sufixos que mudam (ex.: -debian-11-rX)
    pullPolicy: IfNotPresent
    pullSecrets:               # Bitnami espera "pullSecrets" (lista de strings)
      - dockerhub-cred

  primary:
    image:
      registry: docker.io
      repository: bitnami/postgresql
      tag: "16"
      pullPolicy: IfNotPresent
      pullSecrets:
        - dockerhub-cred
    # Alguns charts Bitnami também aceitam imagePullSecrets em paralelo; deixar não atrapalha.
    imagePullSecrets:
      - dockerhub-cred

    persistence:
      enabled: true
      size: 5Gi

  auth:
    username: backstage
    password: backstagepass
    postgresPassword: "adminpass"
    database: catalog

# ------------------------------
# Backstage appConfig
# ------------------------------
appConfig:
  app:
    title: "Backstage - Lab do Nilton"
    baseUrl: "http://backstage.localtest.me"

  backend:
    baseUrl: "http://backstage.localtest.me"
    listen:
      port: 7007
    database:
      client: pg
      connection:
        host: backstage-postgresql
        port: 5432
        user: backstage
        password: backstagepass
        database: catalog

  techdocs:
    builder: "local"
    publisher:
      type: "local"

  kubernetes:
    serviceLocatorMethod:
      type: "multiTenant"
    clusterLocatorMethods:
      - type: "config"
        clusters:
          - url: "https://kubernetes.default.svc"
            name: "kind-argocd-demo"
            authProvider: "serviceAccount"
            skipTLSVerify: true

  argocd:
    baseUrl: "http://argocd.localtest.me"

envFrom:
  - secretRef:
      name: backstage-secrets
